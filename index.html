<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3Dポケベル // SIGN-X v6.1</title>
  
  <link rel="stylesheet" href="/src/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    
    <!-- Header -->
    <header>
      <div class="logo-area">
        <h1>3Dポケベル</h1>
        <p>SIGN-X v6.1 — 手話的3次元言語</p>
      </div>
      <div class="status-badge">
        <span class="status-dot"></span>
        <span id="linkCount">0 / 0</span>
      </div>
    </header>

    <!-- Main Workspace -->
    <div class="workspace">

      <!-- Network Panel -->
      <div class="net-panel">
        <div class="net-field">
          <label>MY PAGER ID</label>
          <div id="myPagerId" class="net-id-display">📟 OFFLINE</div>
        </div>
      </div>

      <!-- IO Panel -->
      <div class="io-panel">
        <textarea id="inputText" placeholder="ここに自然言語を入力... (例: 今めっちゃテンション上がってる...)"></textarea>
        
        <div class="action-row">
          <button class="btn btn-primary" onclick="App.encodeAndShow()">⚡ ENCODE</button>
          <button class="btn btn-pochi" onclick="App.pochiToNa()">💥 ポチッとな</button>
          <button class="btn" onclick="App.copyOutput()">⧉ COPY</button>
          <button class="btn" onclick="App.clearInput()">CLR</button>
        </div>

        <div class="output-box" id="outputBox">
          — encode / decode result —
        </div>

        <div class="output-meta" id="outputMeta">
          <span>ORIGINAL: <span id="metaOrigLen" class="meta-value">0</span>文字</span>
          <span>PACKET: <span id="metaCodeLen" class="meta-value">0</span>文字</span>
          <span>RATIO: <span id="metaRatio" class="meta-value">100%</span></span>
        </div>
      </div>

      <!-- Keyboard -->
      <div class="keyboard-panel">
        <div class="kb-tabs">
          <div class="kb-tab active" id="tab-signx">SIGN-X</div>
          <div class="kb-tab" id="tab-legacy">LEGACY</div>
        </div>
        <div id="kbMain"></div>
      </div>

    </div>

    <!-- Sidebar (Decoder) -->
    <div class="sidebar">
      <div class="sidebar-panel">
        <h2 class="sidebar-h2">DECODER OUTPUT</h2>
        <div class="decode-grid">
          <div class="decode-item"><span class="decode-label">Legacy</span><span id="decLegacy" class="decode-val">—</span></div>
          <div class="decode-item"><span class="decode-label">Being</span><span id="decBeing" class="decode-val">—</span></div>
          <div class="decode-item"><span class="decode-label">Emotion</span><span id="decEmotion" class="decode-val">—</span></div>
          <div class="decode-item"><span class="decode-label">Field</span><span id="decField" class="decode-val">—</span></div>
          <div class="decode-item"><span class="decode-label">Transition</span><span id="decTransition" class="decode-val">—</span></div>
          <div class="decode-item"><span class="decode-label">Verb</span><span id="decVerbs" class="decode-val">—</span></div>
          <div class="decode-item"><span class="decode-label">Timeline</span><span id="decTimeline" class="decode-val">—</span></div>
        </div>
      </div>
    </div>

  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Scripts -->
  <script type="module" src="/src/js/app.js"></script>

</body>
</html>

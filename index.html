<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3Dポケベル // SIGN-X v7.90</title>
  
  <link rel="stylesheet" href="./src/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    
    <header>
      <div class="logo-area">
        <h1>3Dポケベル</h1>
        <p class="version-text">SIGN-X v7.90 — 四位一体大統一宇宙</p>
      </div>
      <div class="status-badge">
        <span class="status-dot"></span>
        <span id="header-dict-count">● 0 / 0</span>
      </div>
    </header>

    <div class="workspace">

      <div class="net-panel">
        <div class="net-field">
          <label>MY PAGER ID</label>
          <div id="myPagerId" class="net-id-display">📟 ONLINE</div>
        </div>
      </div>

      <div class="io-panel">
        <textarea id="input-box" placeholder="ここに自然言語を入力... (例: 電車が遅れてる、今からガレージ行くよ)"></textarea>
        
        <div class="action-row">
          <button class="btn btn-primary" id="btn-encode" onclick="window.encodeAndShow()">⚡ ENCODE</button>
          <button class="btn btn-secondary">⚡ AUTO DECODE</button>
          <button class="btn btn-pochi" id="btn-pochittona" onclick="window.pochiToNa()">💥 ポチッとな</button>
          
          <button class="btn btn-share" id="btn-share" onclick="window.sharePacketURL()">🔗 SHARE</button>
          
          <button class="btn" onclick="if(typeof window.encodeAndShow === 'function') { navigator.clipboard.writeText(document.getElementById('packet-box').textContent || document.getElementById('packet-box').value); if(window.showToast) window.showToast('⧉ コピーしたよ！'); }">⧉ COPY</button>
          <button class="btn" onclick="document.getElementById('input-box').value=''; if(window.encodeAndShow) window.encodeAndShow();">CLR</button>
        </div>

        <div class="output-box" id="packet-box">
          — encode / decode result —
        </div>

        <div class="output-meta" id="outputMeta" style="display: block; font-family: 'Share Tech Mono', monospace;">
          <span>ORIGINAL: <span id="metaOrigLen" style="color: #00ffcc;">0</span> 文字</span>
          <span style="margin: 0 10px;">|</span>
          <span>PACKET: <span id="metaCodeLen" style="color: #ff007f;">0</span> 文字</span>
          <span style="margin: 0 10px;">|</span>
          <span>RATIO: <span id="metaRatio" style="color: #ffff00; font-weight: bold;">100%</span></span>
        </div>
      </div>

      <div class="keyboard-panel">
        <div class="kb-tabs">
          <div class="kb-tab active" id="tab-signx">SIGN-X</div>
          <div class="kb-tab" id="tab-legacy">LEGACY</div>
        </div>
        <div id="keyboardContainer"></div>
      </div>

    </div>

    <div class="sidebar">
      <div class="sidebar-panel">
        <h2 class="sidebar-h2">DECODER OUTPUT</h2>
        <div class="decode-grid">
          <div class="decode-item"><span class="decode-label">Legacy</span><span id="decLegacy" class="decode-val">—</span></div>
          <div class="decode-item"><span class="decode-label">Being</span><span id="decBeing" class="decode-val">—</span></div>
          <div class="decode-item"><span class="decode-label">Emotion</span><span id="decEmotion" class="decode-val">—</span></div>
          <div class="decode-item"><span class="decode-label">Field</span><span id="decField" class="decode-val">—</span></div>
          <div class="decode-item"><span class="decode-label">Verb</span><span id="decVerbs" class="decode-val">—</span></div>
          <div class="decode-item"><span class="decode-label">Timeline</span><span id="decTimeline" class="decode-val">—</span></div>
        </div>
      </div>
    </div>

  </div>

  <div id="toast" class="toast"></div>

  <script type="module" src="./src/js/grammar.js"></script>
  <script type="module" src="./src/js/dict-loader.js"></script>
  <script type="module" src="./src/js/keyboard.js"></script>
  <script type="module" src="./src/js/app.js"></script>

</body>
</html>
